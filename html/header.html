<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="icon" href="../images/icon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div id="header_top">
            <img class="logo" src="../images/logo.svg" alt="">
            <div class="utility">
                <div class="utility_left">
                    <div class="box">
                        <span>Quick Questions? Email Us</span>
                        <a href="">info@discoveryworldtrekking.com</a>
                    </div>
                </div>
                <div class="utility_right">
                    <img class="person_image" src="../images/chat-person.webp" alt="">
                    <div class="box">
                        <span>Talk to an Expert (Paul)</span>
                        <div><a href="">9779840055491</a><img class="whatsapp_image" src="../images/whatsapp.png" alt=""></div>
                    </div>
                </div>
            </div>
            <div class="menubar">
                <img src="../images/search.png" alt="">
                <img src="../images/envelope.png" alt="">
                <img src="../images/whatsapp.png" alt="">
                <img src="../images/bar.png" alt="">
            </div>
        </div>
        <div id="header_bottom">
        </div>
    </header>
    <script src="../javascripts/header.js"></script>
</body>

</html>
